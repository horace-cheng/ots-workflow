# =============================================================================
# OTS Fast Track — Cloud Workflows Definition
# =============================================================================
# 觸發：Pub/Sub 訊息（order_id, track_type=fast）
# 步驟：preprocess → nmt → qa_auto → qa_human（條件性）→ deliver
#
# 每個步驟呼叫對應的 Cloud Run Job，並等待執行完成後再繼續下一步。
# 失敗時自動 retry（最多 3 次），超過後進 dead-letter 並通知 admin。
# =============================================================================

main:
  params: [args]
  steps:

    # ── 解析輸入 ──────────────────────────────────────────────────────────────
    - init:
        assign:
          - order_id: ${args.order_id}
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-east1"
          - pipeline_env: ${sys.get_env("ENV", "dev")}
          - api_base: ${sys.get_env("API_BASE_URL")}
          - base_job_url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs"}'
          - exec_base_url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/"}'

    # ── Step 1: Pre-process ───────────────────────────────────────────────────
    - log_preprocess_start:
        call: sys.log
        args:
          text: '${"[Fast Track] Starting preprocess for order: " + order_id}'
          severity: INFO

    - run_preprocess:
        call: http.post
        args:
          url: '${base_job_url + "/ots-ft-preprocess-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
        result: preprocess_result

    - wait_preprocess:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + preprocess_result.body.metadata.name}'
          step_name: "preprocess"
          order_id: ${order_id}

    # ── Step 2: NMT（台語 → 目標語）──────────────────────────────────────────
    - log_nmt_start:
        call: sys.log
        args:
          text: '${"[Fast Track] Starting NMT for order: " + order_id}'
          severity: INFO

    - run_nmt:
        try:
          call: http.post
          args:
            url: '${base_job_url + "/ots-ft-nmt-" + pipeline_env + ":run"}'
            auth:
              type: OAuth2
            body:
              overrides:
                containerOverrides:
                  - env:
                    - name: ORDER_ID
                      value: ${order_id}
          result: nmt_result
        retry:
          predicate: ${default_retry_predicate}
          max_retries: 2
          backoff:
            initial_delay: 10
            max_delay: 60
            multiplier: 2

    - wait_nmt:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + nmt_result.body.metadata.name}'
          step_name: "nmt"
          order_id: ${order_id}

    # ── Step 3: Auto QA（4層驗證）────────────────────────────────────────────
    - log_qa_auto_start:
        call: sys.log
        args:
          text: '${"[Fast Track] Starting auto QA for order: " + order_id}'
          severity: INFO

    - run_qa_auto:
        call: http.post
        args:
          url: '${base_job_url + "/ots-ft-qa-auto-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
        result: qa_auto_result

    - wait_qa_auto:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + qa_auto_result.body.metadata.name}'
          step_name: "qa_auto"
          order_id: ${order_id}

    # ── Step 4: Human QA（條件性——只有 must_fix flags 存在時）───────────────
    - check_must_fix:
        call: http.get
        args:
          url: '${api_base + "/internal/qa-flags"}'
          auth:
            type: OIDC
          query:
            order_id: ${order_id}
            flag_level: "must_fix"
            resolved: "false"
        result: must_fix_response

    - route_human_qa:
        switch:
          - condition: ${must_fix_response.body.total > 0}
            steps:
              - notify_human_qa:
                  call: http.post
                  args:
                    url: '${api_base + "/internal/notify"}'
                    auth:
                      type: OIDC
                    body:
                      type: "human_qa_required"
                      order_id: ${order_id}
                      flag_count: ${must_fix_response.body.total}
                  result: notify_result
              - wait_for_human_qa:
                  call: sys.sleep
                  args:
                    seconds: 3600   # 輪詢間隔 1 小時，最多等 24 小時
              - poll_human_qa:
                  call: http.get
                  args:
                    url: '${api_base + "/internal/qa-flags"}'
                    auth:
                      type: OIDC
                    query:
                      order_id: ${order_id}
                      flag_level: "must_fix"
                      resolved: "false"
                  result: poll_result
              - check_all_resolved:
                  switch:
                    - condition: ${poll_result.body.total > 0}
                      next: wait_for_human_qa   # 繼續等待

    # ── Step 5: Deliver ───────────────────────────────────────────────────────
    - log_deliver_start:
        call: sys.log
        args:
          text: '${"[Fast Track] Starting delivery for order: " + order_id}'
          severity: INFO

    - run_deliver:
        call: http.post
        args:
          url: '${base_job_url + "/ots-ft-deliver-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
        result: deliver_result

    - wait_deliver:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + deliver_result.body.metadata.name}'
          step_name: "deliver"
          order_id: ${order_id}

    - log_complete:
        call: sys.log
        args:
          text: '${"[Fast Track] Pipeline completed for order: " + order_id}'
          severity: INFO

    - return_result:
        return:
          order_id: ${order_id}
          status: "delivered"

    # ── 錯誤處理 ──────────────────────────────────────────────────────────────
    - handle_error:
        steps:
          - log_error:
              call: sys.log
              args:
                text: '${"[Fast Track] Pipeline error for order: " + order_id + " — " + sys.get_env("ERROR_MSG", "unknown")}'
                severity: ERROR
          - notify_admin_error:
              call: http.post
              args:
                url: '${api_base + "/internal/notify"}'
                auth:
                  type: OIDC
                body:
                  type: "pipeline_error"
                  order_id: ${order_id}
                  track: "fast"


# ── 等待 Cloud Run Job 執行完成 ───────────────────────────────────────────────
# Cloud Run Jobs `:run` API 在 execution 建立時即回傳 200，不代表 job 完成。
# 此 sub-workflow 輪詢 execution 直到 status.completionTime 出現後才返回。
wait_for_execution:
  params: [exec_url, step_name, order_id]
  steps:
    - init:
        assign:
          - attempts: 0
          - max_attempts: 120   # 120 × 15s = 30 分鐘上限

    - poll:
        call: http.get
        args:
          url: ${exec_url}
          auth:
            type: OAuth2
        result: exec

    - check_timeout:
        switch:
          - condition: ${attempts >= max_attempts}
            raise:
              code: 408
              message: '${step_name + " execution timed out for order: " + order_id}'

    - check_done:
        switch:
          - condition: ${"completionTime" in exec.body.status}
            next: evaluate

    - increment_and_sleep:
        steps:
          - increment:
              assign:
                - attempts: ${attempts + 1}
          - sleep:
              call: sys.sleep
              args:
                seconds: 15
          - loop:
              next: poll

    - evaluate:
        switch:
          - condition: ${exec.body.status.succeededCount == 0}
            raise:
              code: 500
              message: '${step_name + " job failed for order: " + order_id}'
        return: ${exec.body.status}


# ── Retry predicate（5xx 和 timeout 才 retry，4xx 不 retry）────────────────
default_retry_predicate:
  params: [exception]
  steps:
    - check_exception:
        switch:
          - condition: ${exception.code == 429 or exception.code >= 500}
            return: true
    - otherwise:
        return: false
