# =============================================================================
# OTS Literary Track — Cloud Workflows Definition
# =============================================================================
# 觸發：Pub/Sub 訊息（order_id, track_type=literary）
# 步驟：preprocess+nmt → qa_auto → notify_editor → wait_editor → notify_proofreader
#        → wait_proofreader → qa_checklist → deliver
#
# Auto QA runs on NMT output BEFORE editor — flags are visible to editor
# so they can be fixed during the editing pass.
#
# Literary Track 的人工步驟（editor, proofreader）透過輪詢 API 確認完成狀態，
# 不用 webhook，避免長時間等待的 workflow state 管理複雜化。
# =============================================================================

main:
  params: [args]
  steps:

    # ── 解析輸入 ──────────────────────────────────────────────────────────────
    - init:
        assign:
          - order_id: ${args.order_id}
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-east1"
          - pipeline_env: ${sys.get_env("ENV", "dev")}
          - api_base: ${sys.get_env("API_BASE_URL")}
          - base_job_url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/jobs"}'
          - exec_base_url: '${"https://" + region + "-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/" + project_id + "/executions/"}'
          - poll_interval: 120    # 每2分鐘輪詢一次
          - editor_timeout: 604800  # 7 天 editor timeout (文學翻譯需要較長時間)

    # ── Step 1: Pre-process + NMT（AI 初稿）──────────────────────────────────
    - log_nmt_start:
        call: sys.log
        args:
          text: '${"[Literary Track] Starting preprocess+NMT for order: " + order_id}'
          severity: INFO

    - run_preprocess_nmt:
        call: http.post
        args:
          url: '${base_job_url + "/ots-lt-preprocess-nmt-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
        result: nmt_result

    - wait_preprocess_nmt:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + nmt_result.body.metadata.name}'
          step_name: "preprocess_nmt"
          order_id: ${order_id}

    # ── Step 2: Auto QA on NMT output（flags visible to editor）───────────────
    - log_qa_auto_start:
        call: sys.log
        args:
          text: '${"[Literary Track] Starting auto QA on NMT output for order: " + order_id}'
          severity: INFO

    - run_qa_auto:
        call: http.post
        args:
          url: '${base_job_url + "/ots-lt-qa-checklist-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
                  - name: SKIP_STATUS_UPDATE
                    value: "true"
        result: qa_auto_result

    - wait_qa_auto:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + qa_auto_result.body.metadata.name}'
          step_name: "qa_auto"
          order_id: ${order_id}

    # ── Step 3: 通知 Admin 指派編輯 ───────────────────────────────────────────
    - notify_assign_editor:
        call: http.post
        args:
          url: '${api_base + "/internal/notify"}'
          auth:
            type: OIDC
          body:
            type: "literary_assign_editor"
            order_id: ${order_id}
        result: notify_assign_result

    - log_waiting_editor:
        call: sys.log
        args:
          text: '${"[Literary Track] Waiting for editor assignment: " + order_id}'
          severity: INFO

    # ── Step 4: 等待 editor 完成（輪詢，最多 7 天）──────────────────────────
    - init_editor_wait:
        assign:
          - editor_waited: 0
          - editor_done: false

    - poll_editor_loop:
        steps:
          - check_editor_timeout:
              switch:
                - condition: ${editor_waited >= editor_timeout}
                  steps:
                    - editor_timeout_notify:
                        call: http.post
                        args:
                          url: '${api_base + "/internal/notify"}'
                          auth:
                            type: OIDC
                          body:
                            type: "literary_editor_timeout"
                            order_id: ${order_id}
                    - editor_timeout_error:
                        raise:
                          code: 408
                          message: '${"Editor timeout for order: " + order_id}'
          - get_assignment_status:
              call: http.get
              args:
                url: '${api_base + "/internal/assignments/" + order_id}'
                auth:
                  type: OIDC
              result: assignment_response
          - check_editor_done:
              switch:
                - condition: ${assignment_response.body.status == "editor_done" or assignment_response.body.status == "proofreading" or assignment_response.body.status == "proofread_done" or assignment_response.body.status == "delivered"}
                  steps:
                    - mark_editor_done:
                        assign:
                          - editor_done: true
                    - break_editor_loop:
                        next: after_editor
          - sleep_editor:
              call: sys.sleep
              args:
                seconds: ${poll_interval}
          - increment_editor_wait:
              assign:
                - editor_waited: ${editor_waited + poll_interval}
              next: poll_editor_loop

    - after_editor:
        call: sys.log
        args:
          text: '${"[Literary Track] Editor done for order: " + order_id}'
          severity: INFO

    # ── Step 5: 通知 Admin 指派母語校對 ──────────────────────────────────────
    - notify_assign_proofreader:
        call: http.post
        args:
          url: '${api_base + "/internal/notify"}'
          auth:
            type: OIDC
          body:
            type: "literary_assign_proofreader"
            order_id: ${order_id}

    # ── Step 6: 等待 proofreader 完成（最多 48 小時）────────────────────────
    - init_proof_wait:
        assign:
          - proof_waited: 0
          - proof_timeout: 172800   # 48 小時

    - poll_proof_loop:
        steps:
          - check_proof_timeout:
              switch:
                - condition: ${proof_waited >= proof_timeout}
                  steps:
                    - proof_timeout_notify:
                        call: http.post
                        args:
                          url: '${api_base + "/internal/notify"}'
                          auth:
                            type: OIDC
                          body:
                            type: "literary_proofreader_timeout"
                            order_id: ${order_id}
                    - proof_timeout_error:
                        raise:
                          code: 408
                          message: '${"Proofreader timeout for order: " + order_id}'
          - get_proof_status:
              call: http.get
              args:
                url: '${api_base + "/internal/assignments/" + order_id}'
                auth:
                  type: OIDC
              result: proof_response
          - check_proof_done:
              switch:
                - condition: ${proof_response.body.status == "proofread_done" or proof_response.body.status == "delivered"}
                  next: after_proofreader
          - sleep_proof:
              call: sys.sleep
              args:
                seconds: ${poll_interval}
          - increment_proof_wait:
              assign:
                - proof_waited: ${proof_waited + poll_interval}
              next: poll_proof_loop

    - after_proofreader:
        call: sys.log
        args:
          text: '${"[Literary Track] Proofreading done for order: " + order_id}'
          severity: INFO

    # ── Step 7: Auto QA Checklist (final check before delivery) ──────────────
    - run_qa_checklist:
        call: http.post
        args:
          url: '${base_job_url + "/ots-lt-qa-checklist-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
        result: qa_result

    - wait_qa_checklist:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + qa_result.body.metadata.name}'
          step_name: "qa_checklist"
          order_id: ${order_id}

    # ── Step 8: Deliver ───────────────────────────────────────────────────────
    - run_deliver:
        call: http.post
        args:
          url: '${base_job_url + "/ots-lt-deliver-" + pipeline_env + ":run"}'
          auth:
            type: OAuth2
          body:
            overrides:
              containerOverrides:
                - env:
                  - name: ORDER_ID
                    value: ${order_id}
        result: deliver_result

    - wait_deliver:
        call: wait_for_execution
        args:
          exec_url: '${exec_base_url + deliver_result.body.metadata.name}'
          step_name: "deliver"
          order_id: ${order_id}

    - log_complete:
        call: sys.log
        args:
          text: '${"[Literary Track] Pipeline completed for order: " + order_id}'
          severity: INFO

    - return_result:
        return:
          order_id: ${order_id}
          status: "delivered"
          track: "literary"

    # ── 錯誤處理 ──────────────────────────────────────────────────────────────
    - handle_error:
        steps:
          - log_error:
              call: sys.log
              args:
                text: '${"[Literary Track] Pipeline error for order: " + order_id}'
                severity: ERROR
          - notify_admin_error:
              call: http.post
              args:
                url: '${api_base + "/internal/notify"}'
                auth:
                  type: OIDC
                body:
                  type: "pipeline_error"
                  order_id: ${order_id}
                  track: "literary"


# ── 等待 Cloud Run Job 執行完成 ───────────────────────────────────────────────
wait_for_execution:
  params: [exec_url, step_name, order_id]
  steps:
    - init:
        assign:
          - attempts: 0
          - max_attempts: 480   # 480 × 15s = 2 小時上限（LT 翻譯可能較慢）

    - poll:
        call: http.get
        args:
          url: ${exec_url}
          auth:
            type: OAuth2
        result: exec

    - check_timeout:
        switch:
          - condition: ${attempts >= max_attempts}
            raise:
              code: 408
              message: '${step_name + " execution timed out for order: " + order_id}'

    - check_done:
        switch:
          - condition: ${"completionTime" in exec.body.status}
            next: evaluate

    - increment_and_sleep:
        steps:
          - increment:
              assign:
                - attempts: ${attempts + 1}
          - sleep:
              call: sys.sleep
              args:
                seconds: 15
          - loop:
              next: poll

    - evaluate:
        switch:
          - condition: ${("failedCount" in exec.body.status and exec.body.status.failedCount > 0) or not("succeededCount" in exec.body.status) or exec.body.status.succeededCount == 0}
            raise:
              code: 500
              message: '${step_name + " job failed for order: " + order_id}'

    - return_status:
        return: ${exec.body.status}


# ── Retry predicate（5xx 和 timeout 才 retry，4xx 不 retry）────────────────
default_retry_predicate:
  params: [exception]
  steps:
    - check_exception:
        switch:
          - condition: ${exception.code == 429 or exception.code >= 500}
            return: true
    - otherwise:
        return: false
